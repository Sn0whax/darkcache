---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: darkcache-laptop
description: Fedora Kinoite image based on BlueBuild's base images with CachyOS kernel (Laptop)
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: 44

modules:
  # Install KDE themes
  - type: script
    scripts:
      - install-kde-themes.sh

  # Copy necessary system files
  - type: files
    files:
      - source: system-laptop
        destination: /
      - source: common
        destination: /

  # Minimal base image without extra GUI or CLI tools
  - type: dnf
    repos:
      cleanup: true
      copr:
        - faugus/faugus-launcher
        - ilyaz/LACT
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
        - toolbox
        - kmahjongg
        - kmines
        - dragon
        - elisa-player
        - khelpcenter
        - kwrite

        - kolourpaint
        - skanpage
        - krdc
        - krfb
    install:
      skip-unavailable: true
      packages:
        - NetworkManager
        - NetworkManager-wifi
        - plasma-nm
        - https://github.com/sigstore/cosign/releases/download/v3.0.2/cosign-3.0.2-1.x86_64.rpm
        - gamemode
        - btop
        - brave-origin
        - faugus-launcher
        - lact
        - haruna
        - obs-studio
        - audacious
        - kate
        - steam

  # Cachyos kernel
  - type: custom-kernel
    source: local
    kernel: cachyos
    initramfs: true
    sign: 
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: darkcache
    secrets:
    - type: file
      source: ./MOK.priv
      mount: 
        type: file
        destination: /tmp/certs/MOK.priv

  # Cachyos addons
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
    remove:
      packages:
        - zram-generator-defaults
    install:
      skip-unavailable: true
      packages:
        - cachyos-settings
        - scx-scheds
        - scx-tools

  # Needed services
  - type: systemd
    system:
      enabled:
        - NetworkManager.service
        - lactd.service
        - podman.socket                 # needed for flatpaks to access toolbox containers
        - flatpak-firstboot.service     # installs the default flatpaks
        - scx_loader.service            # enables scxsched

  # Set OS name
  - type: os-release
    properties:
      DEFAULT_HOSTNAME: darkcache
      ID: darkcache
      ID_LIKE: fedora
      NAME: DarkCache
      PRETTY_NAME: DarkCache - Fedora Silverblue with CachyOS Kernel (Laptop)

  - type: signing
