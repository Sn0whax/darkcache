---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: darkcache-desktop-nvidia
description: Fedora Kinoite image based on BlueBuild's base images with CachyOS kernel and Nvidia (Desktop)
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: 44

modules:
  # Install KDE themes
  - type: script
    scripts:
      - install-kde-themes.sh

  # Copy necessary system files
  - type: files
    files:
      - source: system-desktop
        destination: /
      - source: system-desktop-nvidia
        destination: /
      - source: common
        destination: /

  # Set up the base image apps/tools
  - type: dnf
    repos:
      cleanup: true
      copr:
        - faugus/faugus-launcher
        - ilyaz/LACT
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
        - toolbox
        - kmahjongg
        - kmines
        - dragon
        - elisa-player
        - khelpcenter
        - kwrite
        - kolourpaint
        - skanpage
        - krdc
        - krfb
    install:
      skip-unavailable: true
      packages:
        - gamemode
        - btop
        - brave-origin
        - faugus-launcher
        - lact
        - haruna
        - obs-studio
        - audacious
        - kate

  # Expose audio group to users
  - type: script
    snippets:
      - 'grep -E "^audio:" /usr/lib/group >> /etc/group'

  # Cachyos kernel
  - type: custom-kernel
    source: local
    kernel: cachyos
    initramfs: true
    nvidia: true
    sign: 
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: darkcache
    secrets:
    - type: file
      source: ./MOK.priv
      mount: 
        type: file
        destination: /tmp/certs/MOK.priv

  # Cachyos addons
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
    remove:
      packages:
        - zram-generator-defaults
    install:
      skip-unavailable: true
      packages:
        - cachyos-settings
        - scx-scheds
        - scx-tools

  # Needed services
  - type: systemd
    system:
      enabled:
        - lactd.service
        - podman.socket                 # needed for flatpaks to access toolbox containers
        - flatpak-firstboot.service     # installs the default flatpaks

  # Set OS name
  - type: os-release
    properties:
      DEFAULT_HOSTNAME: darkcache
      ID: darkcache
      ID_LIKE: fedora
      NAME: DarkCache
      PRETTY_NAME: DarkCache - Fedora Silverblue with CachyOS Kernel (Desktop)

  # Sign container image
  - type: signing
